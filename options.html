<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard Settings</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f3f4f6;
            color: #1f2937;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            font-size: 18px;
            color: #374151;
            margin-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 8px;
        }

        .list-container {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
        }

        .list-header {
            background: #f9fafb;
            padding: 10px 15px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        .list-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            outline: none;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
        }

        .btn-primary:hover {
            background: #4338ca;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 4px 8px;
            font-size: 12px;
        }

        .list-items {
            max-height: 300px;
            overflow-y: auto;
        }

        .list-item {
            padding: 10px 15px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .empty-state {
            padding: 20px;
            text-align: center;
            color: #9ca3af;
            font-style: italic;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .setting-info h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }

        .setting-info p {
            margin: 0;
            font-size: 12px;
            color: #6b7280;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #10b981;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ PhishGuard Settings</h1>
        </div>

        <div class="content">
            <div class="section">
                <h2>General Preferences</h2>
                <div class="setting-row">
                    <div class="setting-info">
                        <h3>Automatic Scanning</h3>
                        <p>Automatically scan emails when opened</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="setting-autoscan" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <!-- Future notification settings -->
            </div>

            <div class="section">
                <h2>Trusted Senders (Whitelist)</h2>
                <div class="list-container">
                    <div class="list-header">
                        <input type="text" id="whitelist-input" class="list-input"
                            placeholder="Enter email or domain (e.g., example.com)">
                        <button id="whitelist-add-btn" class="btn btn-primary">Add</button>
                    </div>
                    <div id="whitelist-items" class="list-items">
                        <!-- Items injected here -->
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Blocked Senders (Blocklist)</h2>
                <div class="list-container">
                    <div class="list-header">
                        <input type="text" id="blocklist-input" class="list-input" placeholder="Enter email or domain">
                        <button id="blocklist-add-btn" class="btn btn-primary"
                            style="background-color: #ef4444;">Block</button>
                    </div>
                    <div id="blocklist-items" class="list-items">
                        <!-- Items injected here -->
                    </div>
                </div>
            </div>

            <div style="margin-top: 30px; text-align: center; color: #6b7280; font-size: 12px;">
                PhishGuard v1.0 • <a href="#" style="color: #667eea; text-decoration: none;">Help & Support</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="whitelist-manager.js"></script>
    <script src="options.js"></script>
</body>

</html>
